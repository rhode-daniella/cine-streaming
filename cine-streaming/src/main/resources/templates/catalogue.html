<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue — CINÉ-STREAMING</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#0a0a0f; --surface:#1a1a2e; --surface2:#12121a;
            --accent:#e50914; --accent2:#ff6b6b;
            --text:#ffffff; --text-muted:#aaaaaa;
            --card-bg:#1e1e2e; --nav-bg:rgba(10,10,15,0.95);
            --border:rgba(255,255,255,0.07);
        }
        body.theme-rose { --bg:#1a0a12; --surface:#3a1530; --surface2:#2a1020; --accent:#e91e8c; --accent2:#ff69b4; --card-bg:#2a1525; --nav-bg:rgba(26,10,18,0.95); }
        body.theme-bleu  { --bg:#0a0f1a; --surface:#152035; --surface2:#0f1a2a; --accent:#1e90ff; --accent2:#63b3ff; --card-bg:#152030; --nav-bg:rgba(10,15,26,0.95); }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; overflow-x:hidden; transition:background 0.5s; }

        /* NAVBAR */
        nav { position:fixed; top:0; left:0; right:0; z-index:1000; background:var(--nav-bg); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 40px; height:65px; display:flex; align-items:center; justify-content:space-between; }
        .nav-left { display:flex; align-items:center; gap:40px; }
        .logo { font-family:'Bebas Neue',cursive; font-size:28px; color:var(--accent); letter-spacing:3px; text-decoration:none; }
        .nav-links { display:flex; gap:28px; list-style:none; }
        .nav-links a { color:var(--text-muted); text-decoration:none; font-size:14px; font-weight:500; transition:color 0.2s; position:relative; }
        .nav-links a::after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:2px; background:var(--accent); transition:width 0.3s; }
        .nav-links a:hover { color:var(--text); }
        .nav-links a:hover::after,.nav-links a.active::after { width:100%; }
        .nav-links a.active { color:var(--text); }
        .nav-right { display:flex; align-items:center; gap:16px; }
        .nav-icon { width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.07); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; color:var(--text-muted); text-decoration:none; }
        .nav-icon:hover { background:var(--accent); border-color:var(--accent); color:white; }
        .avatar { width:38px; height:38px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; cursor:pointer; border:2px solid transparent; transition:all 0.2s; }
        .avatar:hover { border-color:var(--text); }

        /* LAYOUT */
        .page-wrapper { display:flex; padding-top:65px; min-height:100vh; }

        /* SIDEBAR */
        .sidebar { width:260px; flex-shrink:0; background:var(--surface2); border-right:1px solid var(--border); padding:28px 18px; position:sticky; top:65px; height:calc(100vh - 65px); overflow-y:auto; }
        .sidebar-section { margin-bottom:28px; }
        .sidebar-title { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
        .sidebar-title::before { content:''; display:block; width:3px; height:12px; background:var(--accent); border-radius:2px; }

        .sidebar-search { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; padding:10px 14px; transition:all 0.3s; }
        .sidebar-search:focus-within { border-color:var(--accent); }
        .sidebar-search input { background:none; border:none; outline:none; color:var(--text); font-family:'Outfit',sans-serif; font-size:13px; width:100%; }
        .sidebar-search input::placeholder { color:var(--text-muted); }

        .type-toggle { display:flex; gap:6px; flex-wrap:wrap; }
        .type-btn { padding:7px 14px; border-radius:20px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text-muted); font-family:'Outfit',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; }
        .type-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }
        .type-btn.active { background:var(--accent); border-color:var(--accent); color:white; }

        .filter-group { display:flex; flex-direction:column; gap:5px; }
        .filter-btn { display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border-radius:8px; background:transparent; border:1px solid transparent; color:var(--text-muted); font-family:'Outfit',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; text-align:left; }
        .filter-btn:hover { background:rgba(255,255,255,0.05); color:var(--text); }
        .filter-btn.active { background:rgba(229,9,20,0.12); border-color:var(--accent); color:var(--text); }
        .filter-btn .count { font-size:11px; background:rgba(255,255,255,0.1); padding:2px 7px; border-radius:10px; }
        .filter-btn.active .count { background:var(--accent); color:white; }

        .reset-btn { width:100%; padding:10px; border-radius:8px; background:transparent; border:1px solid var(--border); color:var(--text-muted); font-family:'Outfit',sans-serif; font-size:13px; cursor:pointer; transition:all 0.2s; margin-top:4px; }
        .reset-btn:hover { border-color:var(--accent); color:var(--accent); }

        /* MAIN */
        .main-content { flex:1; padding:30px 36px; }
        .catalogue-header { margin-bottom:28px; }
        .catalogue-title { font-family:'Bebas Neue',cursive; font-size:36px; letter-spacing:3px; margin-bottom:4px; }
        .catalogue-subtitle { font-size:14px; color:var(--text-muted); margin-bottom:4px; }
        .results-count { font-size:13px; color:var(--text-muted); }
        .results-count span { color:var(--accent); font-weight:600; }

        /* CATEGORY SECTION */
        .cat-section { margin-bottom:48px; }
        .cat-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; padding-bottom:12px; border-bottom:1px solid var(--border); }
        .cat-icon { width:34px; height:34px; border-radius:8px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
        .cat-name { font-family:'Bebas Neue',cursive; font-size:24px; letter-spacing:2px; }
        .cat-count { font-size:12px; color:var(--text-muted); background:rgba(255,255,255,0.07); padding:3px 10px; border-radius:10px; margin-left:auto; }

        .films-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:14px; }

        /* FILM CARD */
        .film-card { position:relative; border-radius:10px; overflow:hidden; cursor:pointer; aspect-ratio:2/3; background:var(--card-bg); transition:transform 0.3s,box-shadow 0.3s; }
        .film-card:hover { transform:scale(1.05) translateY(-4px); box-shadow:0 20px 50px rgba(0,0,0,0.7); z-index:10; }
        .film-card img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.4s; }
        .film-card:hover img { transform:scale(1.08); }
        .film-card-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.95) 0%,rgba(0,0,0,0.2) 55%,transparent 100%); opacity:0; transition:opacity 0.35s ease; display:flex; flex-direction:column; justify-content:flex-end; padding:14px; }
        .film-card:hover .film-card-overlay { opacity:1; }
        .film-card-title { font-size:12px; font-weight:600; margin-bottom:8px; line-height:1.3; }
        .film-card-actions { display:flex; gap:7px; opacity:0; transform:translateY(10px); transition:all 0.35s ease 0.05s; }
        .film-card:hover .film-card-actions { opacity:1; transform:translateY(0); }
        .card-btn { width:32px; height:32px; border-radius:50%; border:2px solid rgba(255,255,255,0.7); background:rgba(0,0,0,0.5); color:white; display:flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer; transition:all 0.2s; backdrop-filter:blur(5px); }
        .card-btn:hover { background:var(--accent); border-color:var(--accent); transform:scale(1.1); }
        .card-btn.play { background:var(--accent); border-color:var(--accent); width:36px; height:36px; font-size:13px; }
        .card-btn.play:hover { background:var(--accent2); transform:scale(1.15); }
        .film-rating { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); border-radius:4px; padding:3px 6px; font-size:11px; font-weight:600; color:#f5c518; display:flex; align-items:center; gap:3px; }
        .type-badge { position:absolute; top:8px; left:8px; background:var(--accent); color:white; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:2px 7px; border-radius:3px; }

        /* NO RESULTS */
        .no-results { text-align:center; padding:80px 20px; color:var(--text-muted); }
        .no-results i { font-size:56px; margin-bottom:20px; opacity:0.2; display:block; }
        .no-results h3 { font-size:20px; margin-bottom:8px; color:var(--text); }

        /* ===== DETAIL PAGE ===== */
        .detail-page { display:none; position:fixed; inset:0; z-index:2000; background:var(--bg); overflow-y:auto; }
        .detail-page.open { display:block; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }

        .detail-hero { position:relative; height:55vh; overflow:hidden; }
        .detail-bg { width:100%; height:100%; object-fit:cover; object-position:center top; }
        .detail-gradient { position:absolute; inset:0; background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,15,0.4) 60%,transparent 100%), linear-gradient(to right,var(--bg) 0%,transparent 55%); }

        .back-btn { position:absolute; top:24px; left:24px; z-index:10; display:flex; align-items:center; gap:8px; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.15); color:white; padding:10px 20px; border-radius:25px; font-family:'Outfit',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; }
        .back-btn:hover { background:var(--accent); border-color:var(--accent); transform:translateX(-3px); }

        .detail-content { padding:0 60px 60px; margin-top:-130px; position:relative; z-index:1; }
        .detail-layout { display:flex; gap:40px; align-items:flex-start; }

        .detail-poster { width:200px; flex-shrink:0; border-radius:12px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.8); }
        .detail-poster img { width:100%; display:block; }

        .detail-info { flex:1; padding-top:30px; }
        .detail-badge { display:inline-block; background:var(--accent); color:white; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 12px; border-radius:3px; margin-bottom:12px; }
        .detail-title { font-family:'Bebas Neue',cursive; font-size:clamp(36px,5vw,70px); line-height:1; letter-spacing:2px; margin-bottom:16px; }

        .detail-meta { display:flex; flex-wrap:wrap; gap:14px; margin-bottom:18px; }
        .meta-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-muted); }
        .meta-item i { color:var(--accent); font-size:12px; }
        .meta-item.rating { color:#f5c518; font-weight:700; }
        .meta-item.rating i { color:#f5c518; }

        .detail-tags { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
        .detail-tag { padding:5px 14px; border-radius:20px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); font-size:12px; font-weight:500; color:var(--text-muted); }

        .detail-desc { font-size:15px; color:rgba(255,255,255,0.78); line-height:1.75; margin-bottom:24px; max-width:700px; }

        .detail-cast-section { margin-bottom:24px; }
        .detail-cast-section h4 { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; }
        .cast-chips { display:flex; gap:8px; flex-wrap:wrap; }
        .cast-chip { padding:6px 14px; border-radius:20px; background:rgba(255,255,255,0.05); border:1px solid var(--border); font-size:12px; color:var(--text-muted); }

        .detail-btns { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:36px; }
        .btn-primary { display:flex; align-items:center; gap:8px; background:var(--accent); color:white; border:none; padding:14px 32px; border-radius:8px; font-family:'Outfit',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s; }
        .btn-primary:hover { background:var(--accent2); transform:scale(1.03); }
        .btn-secondary { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); padding:14px 24px; border-radius:8px; font-family:'Outfit',sans-serif; font-size:15px; font-weight:500; cursor:pointer; transition:all 0.2s; }
        .btn-secondary:hover { background:rgba(255,255,255,0.18); }

        .detail-extra { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:20px; padding-top:28px; border-top:1px solid var(--border); }
        .extra-item h5 { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
        .extra-item p { font-size:14px; color:var(--text); }

        /* TOAST */
        .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:14px 24px; font-size:14px; font-weight:500; z-index:9999; transition:transform 0.4s cubic-bezier(0.4,0,0.2,1); display:flex; align-items:center; gap:10px; }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .toast i { color:var(--accent); }

        /* FOOTER */
        footer { background:#050508; border-top:1px solid var(--border); padding:24px 60px; }
        .footer-copy { font-size:12px; color:var(--text-muted); text-align:center; }
        .footer-copy span { color:var(--accent); font-weight:600; }

        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:3px; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="nav-left">
        <a href="/" class="logo">CINÉ</a>
        <ul class="nav-links">
            <li><a href="/">Accueil</a></li>
            <li><a href="/films">Films</a></li>
            <li><a href="/series">Séries</a></li>
            <li><a href="/animes">Animés</a></li>
            <li><a href="/catalogue" class="active">Catalogue</a></li>
        </ul>
    </div>
    <div class="nav-right">
        <div class="nav-icon" onclick="openSettings()">
            <i class="fas fa-cog"></i>
        </div>
        <div class="avatar">D</div>
    </div>
</nav>

<!-- PAGE WRAPPER -->
<div class="page-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title">Recherche</div>
            <div class="sidebar-search">
                <i class="fas fa-search" style="color:var(--text-muted);font-size:13px"></i>
                <input type="text" placeholder="Titre, acteur..." id="sideSearch" oninput="applyFilters()">
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">Type</div>
            <div class="type-toggle">
                <button class="type-btn active" onclick="setType('tous',this)">Tous</button>
                <button class="type-btn" onclick="setType('film',this)">Films</button>
                <button class="type-btn" onclick="setType('serie',this)">Séries</button>
                <button class="type-btn" onclick="setType('anime',this)">Animés</button>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">Genre</div>
            <div class="filter-group">
                <button class="filter-btn active" onclick="setGenre('tous',this)">Tous les genres <span class="count" id="cnt-tous"></span></button>
                <button class="filter-btn" onclick="setGenre('action',this)"><span>⚡ Action</span><span class="count" id="cnt-action"></span></button>
                <button class="filter-btn" onclick="setGenre('romance',this)"><span>💕 Romance</span><span class="count" id="cnt-romance"></span></button>
                <button class="filter-btn" onclick="setGenre('thriller',this)"><span>🔍 Thriller</span><span class="count" id="cnt-thriller"></span></button>
                <button class="filter-btn" onclick="setGenre('horreur',this)"><span>💀 Horreur</span><span class="count" id="cnt-horreur"></span></button>
                <button class="filter-btn" onclick="setGenre('comedie',this)"><span>😄 Comédie</span><span class="count" id="cnt-comedie"></span></button>
                <button class="filter-btn" onclick="setGenre('documentaire',this)"><span>🎬 Documentaire</span><span class="count" id="cnt-documentaire"></span></button>
                <button class="filter-btn" onclick="setGenre('anime',this)"><span>🎌 Animés</span><span class="count" id="cnt-anime"></span></button>
            </div>
        </div>

        <button class="reset-btn" onclick="resetFilters()"><i class="fas fa-redo" style="margin-right:6px"></i>Réinitialiser</button>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <div class="catalogue-header">
            <h1 class="catalogue-title">Catalogue</h1>
            <p class="catalogue-subtitle">Découvrez tous nos films, séries et animés</p>
            <p class="results-count"><span id="totalCount">0</span> titres disponibles</p>
        </div>
        <div id="catalogueContent"></div>
    </main>
</div>

<!-- FOOTER -->
<footer>
    <p class="footer-copy">© <span>CINÉ_STREAMING</span> 2025/2026 — Tous droits réservés</p>
</footer>

<!-- ===== PAGE DÉTAIL ===== -->
<div class="detail-page" id="detailPage">
    <div class="detail-hero">
        <img class="detail-bg" id="detailBg" src="" alt="">
        <div class="detail-gradient"></div>
        <button class="back-btn" onclick="closeDetail()">
            <i class="fas fa-arrow-left"></i> Retour au catalogue
        </button>
    </div>
    <div class="detail-content">
        <div class="detail-layout">
            <div class="detail-poster">
                <img id="detailPoster" src="" alt="">
            </div>
            <div class="detail-info">
                <span class="detail-badge" id="detailBadge"></span>
                <h1 class="detail-title" id="detailTitle"></h1>
                <div class="detail-meta">
                    <div class="meta-item rating"><i class="fas fa-star"></i><span id="detailRating"></span></div>
                    <div class="meta-item"><i class="fas fa-calendar"></i><span id="detailAnnee"></span></div>
                    <div class="meta-item"><i class="fas fa-clock"></i><span id="detailDuree"></span></div>
                    <div class="meta-item"><i class="fas fa-film"></i><span id="detailType"></span></div>
                    <div class="meta-item"><i class="fas fa-globe"></i><span id="detailPays"></span></div>
                </div>
                <div class="detail-tags" id="detailTags"></div>
                <p class="detail-desc" id="detailDesc"></p>
                <div class="detail-cast-section">
                    <h4>Casting</h4>
                    <div class="cast-chips" id="detailCast"></div>
                </div>
                <div class="detail-btns">
                    <button class="btn-primary" id="watchBtn" onclick="watchCurrentFilm()"><i class="fas fa-play"></i> Regarder maintenant</button>
                    <button class="btn-secondary" id="listBtn" onclick="toggleDetailList()"><i class="fas fa-plus"></i> Ma liste</button>
                    <button class="btn-secondary"><i class="fas fa-share-alt"></i> Partager</button>
                </div>
            </div>
        </div>
        <div class="detail-extra">
            <div class="extra-item"><h5>Réalisateur</h5><p id="detailReal"></p></div>
            <div class="extra-item"><h5>Studio</h5><p id="detailStudio"></p></div>
            <div class="extra-item"><h5>Langue</h5><p id="detailLangue"></p></div>
            <div class="extra-item"><h5>Qualité</h5><p id="detailQualite"></p></div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script>

    applyFilters();
}

function getFiltered() {
    const q = document.getElementById('sideSearch').value.toLowerCase();
    return FILMS.filter(f => {
        const matchGenre = activeGenre === 'tous' || f.genre === activeGenre;
        const matchType  = activeType  === 'tous' || f.type  === activeType;
        const matchSearch = !q || f.titre.toLowerCase().includes(q) || f.cast.some(c => c.toLowerCase().includes(q));
        return matchGenre && matchType && matchSearch;
    });
}

function applyFilters() {
    const filtered = getFiltered();
    document.getElementById('totalCount').textContent = filtered.length;
    updateCounts(filtered);
    renderCatalogue(filtered);
}

function updateCounts(filtered) {
    const genres = ['action','romance','thriller','horreur','comedie','documentaire','anime'];
    document.getElementById('cnt-tous').textContent = filtered.length;
    genres.forEach(g => {
        const el = document.getElementById('cnt-' + g);
        if (el) el.textContent = filtered.filter(f => f.genre === g).length;
    });
}

// ===== RENDER =====
function renderCatalogue(films) {
    const container = document.getElementById('catalogueContent');

    if (films.length === 0) {
        container.innerHTML = `<div class="no-results"><i class="fas fa-film"></i><h3>Aucun résultat</h3><p>Essaie d'autres filtres</p></div>`;
        return;
    }

    // Grouper par genre si "tous"
    if (activeGenre === 'tous') {
        const genres = ['action','romance','thriller','horreur','comedie','documentaire','anime'];
        let html = '';
        genres.forEach(g => {
            const list = films.filter(f => f.genre === g);
            if (!list.length) return;
            html += `
            <div class="cat-section">
                <div class="cat-header">
                    <div class="cat-icon">${GENRE_ICONS[g]}</div>
                    <span class="cat-name">${GENRE_LABELS[g]}</span>
                    <span class="cat-count">${list.length} titre${list.length>1?'s':''}</span>
                </div>
                <div class="films-grid">${list.map(buildCard).join('')}</div>
            </div>`;
        });
        container.innerHTML = html;
    } else {
        const g = activeGenre;
        container.innerHTML = `
        <div class="cat-section">
            <div class="cat-header">
                <div class="cat-icon">${GENRE_ICONS[g]||'🎬'}</div>
                <span class="cat-name">${GENRE_LABELS[g]||g}</span>
                <span class="cat-count">${films.length} titre${films.length>1?'s':''}</span>
            </div>
            <div class="films-grid">${films.map(buildCard).join('')}</div>
        </div>`;
    }
}

function buildCard(f) {
    const inList = watchlist.some(w => w.id === f.id);
    return `
    <div class="film-card" onclick="openDetail(${f.id})">
        <img src="https://placehold.co/300x450/${f.bg}/999999?text=${encodeURIComponent(f.titre)}" alt="${f.titre}" loading="lazy">
        <div class="film-rating"><i class="fas fa-star"></i> ${f.rating}</div>
        <span class="type-badge">${f.type === 'anime' ? 'Animé' : f.type === 'serie' ? 'Série' : 'Film'}</span>
        <div class="film-card-overlay">
            <div class="film-card-title">${f.titre} · ${f.annee}</div>
            <div class="film-card-actions">
                <button class="card-btn play" title="Regarder" onclick="event.stopPropagation();watchFilmById(${f.id})"><i class="fas fa-play"></i></button>
                <button class="card-btn" title="Infos" onclick="event.stopPropagation();openDetail(${f.id})"><i class="fas fa-info"></i></button>
                <button class="card-btn" title="${inList?'Retirer':'Ajouter'}" onclick="event.stopPropagation();toggleList(${f.id},'${f.titre.replace(/'/g,"\\'")}','${f.annee}','${f.bg}','${f.genre}')">
                    <i class="fas ${inList?'fa-check':'fa-plus'}"></i>
                </button>
            </div>
        </div>
    </div>`;
}

// ===== DETAIL =====
function openDetail(id) {
    const f = FILMS.find(x => x.id === id);
    if (!f) return;
    currentFilm = f;

    document.getElementById('detailBg').src     = `https://placehold.co/1920x600/${f.bg}/888888?text=${encodeURIComponent(f.titre)}`;
    document.getElementById('detailPoster').src  = `https://placehold.co/300x450/${f.bg}/aaaaaa?text=${encodeURIComponent(f.titre)}`;
    document.getElementById('detailBadge').textContent  = GENRE_ICONS[f.genre] + ' ' + (GENRE_LABELS[f.genre] || f.genre);
    document.getElementById('detailTitle').textContent  = f.titre;
    document.getElementById('detailRating').textContent = f.rating;
    document.getElementById('detailAnnee').textContent  = f.annee;
    document.getElementById('detailDuree').textContent  = f.duree;
    document.getElementById('detailType').textContent   = f.type === 'anime' ? 'Animé' : f.type === 'serie' ? 'Série' : 'Film';
    document.getElementById('detailPays').textContent   = f.pays;
    document.getElementById('detailDesc').textContent   = f.desc;
    document.getElementById('detailReal').textContent   = f.real;
    document.getElementById('detailStudio').textContent = f.studio;
    document.getElementById('detailLangue').textContent = f.langue;
    document.getElementById('detailQualite').textContent= f.qualite;

    document.getElementById('detailTags').innerHTML = f.tags.map(t => `<span class="detail-tag">${t}</span>`).join('');
    document.getElementById('detailCast').innerHTML = f.cast.map(c => `<span class="cast-chip">${c}</span>`).join('');

    const inList = watchlist.some(w => w.id === f.id);
    const lb = document.getElementById('listBtn');
    lb.innerHTML = inList ? '<i class="fas fa-check"></i> Dans ma liste' : '<i class="fas fa-plus"></i> Ma liste';

    document.getElementById('detailPage').classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('detailPage').scrollTop = 0;
}

function closeDetail() {
    document.getElementById('detailPage').classList.remove('open');
    document.body.style.overflow = '';
}

function watchCurrentFilm() {
    if (currentFilm) window.location.href = `/film/${currentFilm.id}/watch`;
}
function watchFilmById(id) { window.location.href = `/film/${id}/watch`; }

function toggleDetailList() {
    if (!currentFilm) return;
    const f = currentFilm;
    const idx = watchlist.findIndex(w => w.id === f.id);
    if (idx === -1) { watchlist.push({id:f.id,titre:f.titre,annee:f.annee,bg:f.bg,genre:f.genre}); showToast(`✓ "${f.titre}" ajouté à ta liste`); }
    else { watchlist.splice(idx,1); showToast(`"${f.titre}" retiré de ta liste`); }
    localStorage.setItem('cine_watchlist', JSON.stringify(watchlist));
    const inList = watchlist.some(w => w.id === f.id);
    document.getElementById('listBtn').innerHTML = inList ? '<i class="fas fa-check"></i> Dans ma liste' : '<i class="fas fa-plus"></i> Ma liste';
    applyFilters();
}

function toggleList(id, titre, annee, bg, genre) {
    const idx = watchlist.findIndex(w => w.id === id);
    if (idx === -1) { watchlist.push({id,titre,annee,bg,genre}); showToast(`✓ "${titre}" ajouté à ta liste`); }
    else { watchlist.splice(idx,1); showToast(`"${titre}" retiré`); }
    localStorage.setItem('cine_watchlist', JSON.stringify(watchlist));
    applyFilters();
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function openSettings() { /* À connecter avec le modal settings */ }

// ===== INIT =====
(function() {
    const saved = localStorage.getItem('cine_theme') || 'dark';
    if (saved !== 'dark') document.body.classList.add('theme-' + saved);
    applyFilters();
    // Fermer détail avec Echap
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });
})();
</script>
